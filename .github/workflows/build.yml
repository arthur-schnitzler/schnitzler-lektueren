name: Build and publish

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  build_pages:
    name: Publish Edition as GitHub Pages Website
    runs-on: ubuntu-latest
    env:
      ANT_OPTS: -Xmx5g
      TYPESENSE_HOST: typesense.acdh-dev.oeaw.ac.at
      TYPESENSE_PORT: 443
      TYPESENSE_PROTOCOL: https
      TYPESENSE_API_KEY: ${{secrets.TYPESENSE_API_KEY}}
    steps:
    - name: Perform Checkout
      uses: actions/checkout@v4
    - name: Sync entity assets from schnitzler-chronik-static
      run: |
        python3 check_entities_xsl.py
        SYNCED_PATHS="xslt/partials/entities.xsl xslt/partials/entities-setup.xsl xslt/partials/relations.json html/css/entities.css html/js/entity-tabs.js"
        if [[ -n "$(git status --porcelain -- $SYNCED_PATHS)" ]]; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $SYNCED_PATHS
          git commit -m "chore: sync entity assets from schnitzler-chronik-static"
          git push
        fi
    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install lxml acdh-tei-pyutils tqdm
    - name: Install Saxon, Ant and Fundament
      run: |
        ./script.sh
    - name: Install Ant-Contrib
      run: |
        wget https://repo1.maven.org/maven2/ant-contrib/ant-contrib/1.0b3/ant-contrib-1.0b3.jar
        mv ant-contrib-1.0b3.jar /usr/share/ant/lib
    - name: Build
      run: |
        ant
    - name: Build Index
      run: |
        ./build_index.sh
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{secrets.GITHUB_TOKEN}}
        publish_dir: ./html
