name: Build and publish

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  build_pages:
    name: Publish Edition as GitHub Pages Website
    runs-on: ubuntu-latest
    env:
      ANT_OPTS: -Xmx5g
      TYPESENSE_HOST: typesense.acdh-dev.oeaw.ac.at
      TYPESENSE_PORT: 443
      TYPESENSE_PROTOCOL: https
      TYPESENSE_API_KEY: ${{secrets.TYPESENSE_API_KEY}}
    steps:
    - name: Perform Checkout
      uses: actions/checkout@v4
    - name: Sync entities.xsl from schnitzler-chronik-static
      run: |
        python3 check_entities_xsl.py
        if [[ -n "$(git status --porcelain xslt/partials/entities.xsl)" ]]; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add xslt/partials/entities.xsl
          git commit -m "chore: sync entities.xsl from schnitzler-chronik-static"
          git push
        fi
    - name: Install Saxon, Ant and Fundament
      run: |
        ./script.sh
    - name: Install Ant-Contrib
      run: |
        wget https://repo1.maven.org/maven2/ant-contrib/ant-contrib/1.0b3/ant-contrib-1.0b3.jar
        mv ant-contrib-1.0b3.jar /usr/share/ant/lib
    - name: Build
      run: |
        ant
    - name: Build Index
      run: |
        ./build_index.sh
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{secrets.GITHUB_TOKEN}}
        publish_dir: ./html
